version: 1.0.{build}

image: Visual Studio 2022

platform: Any CPU
configuration: Release

skip_branch_with_pr: true

cache:
  - packages -> **\packages.config

nuget:
  account_feed: true
  project_feed: true
  disable_publish_on_pr: true

build: off

before_build:
  - nuget restore AcklenAvenue.Email.sln

build_script:
  - ps: $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1; if (-not $msbuild) { throw "MSBuild not found via vswhere." }; & $msbuild "AcklenAvenue.Email.sln" "/verbosity:minimal" "/p:Configuration=$env:CONFIGURATION" "/p:Platform=Any CPU"; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

test: off

after_build:
  - if not exist artifacts md artifacts
  - nuget pack AcklenAvenue.Email\AcklenAvenue.Email.csproj -Properties "Configuration=%CONFIGURATION%;Platform=AnyCPU;OutDir=%APPVEYOR_BUILD_FOLDER%\AcklenAvenue.Email\bin\%CONFIGURATION%\\" -Version %APPVEYOR_BUILD_VERSION% -OutputDirectory artifacts
  - appveyor PushArtifact artifacts\Acklen.Mail.%APPVEYOR_BUILD_VERSION%.nupkg
